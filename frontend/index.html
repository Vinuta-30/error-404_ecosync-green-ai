<!DOCTYPE html>
<html>
<head>
    <title>EcoSync Dashboard</title>

    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <header class="topbar">
        <h1>EcoSync</h1>
        <span id="liveStatus">● Live</span>
    </header>

    <div class="dashboard">

        <!-- Grid Card -->
        <div class="card large">
            <h2>Grid Overview</h2>

            <div class="stats">
                <div>
                    <p>Supply</p>
                    <h3 id="supply">--</h3>
                </div>

                <div>
                    <p>Demand</p>
                    <h3 id="demand">--</h3>
                </div>
            </div>

            <div id="status" class="status">Loading...</div>
        </div>

        <!-- Chart -->
        <div class="card">
            <h2>Energy Trend</h2>
            <canvas id="chart"></canvas>
        </div>

        <!-- AI Decisions -->
        <div class="card">
            <h2>AI Decisions</h2>
            <ul id="log"></ul>
        </div>

        <!-- Carbon -->
        <div class="card">
            <h2>Carbon Efficiency</h2>
            <div class="progress">
                <div id="bar"></div>
            </div>
            <p><span id="carbon">--</span>% saved</p>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
